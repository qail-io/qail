name: Auth Matrix

on:
  push:
    branches: [main]
    paths:
      - 'pg/**'
      - 'gateway/**'
  pull_request:
    paths:
      - 'pg/**'
      - 'gateway/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  auth-modes:
    name: Auth (${{ matrix.auth_mode }} / ${{ matrix.scope }})
    runs-on: ubuntu-latest
    timeout-minutes: 75

    strategy:
      fail-fast: true
      matrix:
        include:
          - auth_mode: trust
            scope: smoke
          - auth_mode: md5
            scope: smoke
          - auth_mode: scram-sha-256
            scope: full

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: qail_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: ${{ matrix.auth_mode }}
          POSTGRES_INITDB_ARGS: "--auth-host=${{ matrix.auth_mode }}"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/qail_test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: auth-${{ matrix.auth_mode }}

      - name: Unit tests (full lane)
        if: matrix.scope == 'full'
        run: cargo test --workspace --lib

      - name: Integration tests (full lane)
        if: matrix.scope == 'full'
        run: cargo test --workspace --test '*'

      - name: Integration smoke (qail-pg)
        if: matrix.scope == 'smoke'
        run: cargo test -p qail-pg --test '*'

  result-formats:
    name: Result format (binary)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: qail_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/qail_test
      QAIL_TEST_RESULT_FORMAT: binary

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: result-binary

      - name: Integration tests (binary format)
        run: cargo test -p qail-pg --test '*'
