name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/qail_test
  QAIL_TEST_DB_URL: postgres://postgres:postgres@localhost:5432/qail_test

jobs:
  test:
    name: Tests (PG ${{ matrix.pg_version }} / ${{ matrix.scope }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: true
      matrix:
        include:
          - pg_version: 14
            scope: smoke
          - pg_version: 15
            scope: smoke
          - pg_version: 16
            scope: smoke
          - pg_version: 17
            scope: full

    services:
      postgres:
        image: postgres:${{ matrix.pg_version }}-alpine
        env:
          POSTGRES_DB: qail_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: pg-${{ matrix.pg_version }}

      # Run full workspace tests once on the canonical lane.
      - name: Unit tests (full lane)
        if: matrix.scope == 'full'
        run: cargo test --workspace --lib

      - name: Migration DB atomicity/lock gates (full lane)
        if: matrix.scope == 'full'
        run: |
          cargo test -p qail migrations::apply::execute::tests::apply_failpoint_before_receipt_rolls_back_commands_in_real_db -- --nocapture
          cargo test -p qail migrations::rollback::tests::rollback_failpoint_before_history_delete_preserves_history_in_real_db -- --nocapture
          cargo test -p qail migrations::lock::tests::advisory_lock_real_db_contention_and_timeout -- --nocapture

      - name: Integration tests (full lane)
        if: matrix.scope == 'full'
        run: cargo test --workspace --test '*'

      # Keep compatibility confidence on older PGs with a narrower smoke suite.
      - name: Integration smoke (qail-pg)
        if: matrix.scope == 'smoke'
        run: cargo test -p qail-pg --test '*'

      - name: Doc tests (full lane)
        if: matrix.scope == 'full'
        run: cargo test --workspace --doc

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  core-syn-scanner:
    name: qail-core syn-scanner drift gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: core-syn-scanner
      - name: Run qail-core tests with syn-scanner
        run: cargo test -p qail-core --lib --features syn-scanner
      - name: Clippy qail-core with syn-scanner
        run: cargo clippy -p qail-core --features syn-scanner -- -D warnings

  wire-fuzz:
    name: qail-pg wire decode fuzz gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PROPTEST_CASES: 800
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: wire-fuzz
      - name: Backend decoder panic-safety proptest
        run: cargo test -p qail-pg --test wire_proptest backend_decode_never_panics
      - name: Backend decoder mutation fuzz tests
        run: cargo test -p qail-pg --test wire_decode_fuzz

  io-uring:
    name: qail-pg io_uring (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      QAIL_PG_IO_BACKEND: io_uring
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: io-uring-linux

      - name: Check qail-pg with io_uring
        run: cargo check -p qail-pg --features io_uring

      - name: Unit tests qail-pg with io_uring
        run: cargo test -p qail-pg --lib --features io_uring

      - name: Clippy qail-pg with io_uring
        run: cargo clippy -p qail-pg --features io_uring -- -D warnings

      - name: Assert backend-labeled connect metrics are wired
        run: |
          grep -n 'qail_pg_connect_attempt_total' pg/src/driver/connection.rs
          grep -n 'qail_pg_connect_duration_seconds' pg/src/driver/connection.rs
          grep -n 'qail_pg_connect_success_total' pg/src/driver/connection.rs
          grep -n 'qail_pg_connect_failure_total' pg/src/driver/connection.rs
          grep -n '"transport" => ' pg/src/driver/connection.rs
          grep -n '"backend" => ' pg/src/driver/connection.rs

  panic-safety:
    name: Panic Safety Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/check-panic-safety.sh

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
