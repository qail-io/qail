name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify versions match tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CORE_VERSION=$(grep '^version' core/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PG_VERSION=$(grep '^version' pg/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          CLI_VERSION=$(grep '^version' cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          QDRANT_VERSION=$(grep '^version' qdrant/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          REDIS_VERSION=$(grep '^version' redis/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          GATEWAY_VERSION=$(grep '^version' gateway/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          
          echo "Tag version: $TAG_VERSION"
          echo "Core: $CORE_VERSION | PG: $PG_VERSION | CLI: $CLI_VERSION"
          echo "Qdrant: $QDRANT_VERSION | Redis: $REDIS_VERSION | Gateway: $GATEWAY_VERSION"
          
          MISMATCH=0
          for V in "$CORE_VERSION" "$PG_VERSION" "$CLI_VERSION" "$QDRANT_VERSION" "$REDIS_VERSION" "$GATEWAY_VERSION"; do
            if [ "$V" != "$TAG_VERSION" ]; then MISMATCH=1; fi
          done
          
          if [ "$MISMATCH" -eq 1 ]; then
            echo "❌ Version mismatch!"
            exit 1
          fi
          echo "✅ All versions match tag"

      - name: Run tests
        run: cargo test --workspace --lib

      - name: Publish qail-core
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p qail-core || echo "qail-core already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for qail-core
        if: ${{ !inputs.dry_run }}
        run: sleep 30

      - name: Publish qail-pg
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p qail-pg || echo "qail-pg already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for qail-pg
        if: ${{ !inputs.dry_run }}
        run: sleep 30

      - name: Publish qail-qdrant
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p qail-qdrant || echo "qail-qdrant already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish qail-redis
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p qail-redis || echo "qail-redis already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for dependencies
        if: ${{ !inputs.dry_run }}
        run: sleep 30

      - name: Publish qail-gateway
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p qail-gateway || echo "qail-gateway already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish qail (CLI)
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p qail || echo "qail already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "🔍 Dry run completed - no packages were published"
          cargo publish -p qail-core --dry-run
          cargo publish -p qail-pg --dry-run
