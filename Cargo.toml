[workspace]
resolver = "2"
members = [
    "core",
    "cli",
    "lsp",
    "encoder",
    "pg",
    "qdrant",
    "gateway",
    "workflow",
]

[workspace.lints.rust]
warnings = "deny"
unused = "deny"
dead_code = "deny"
unused_imports = "deny"
unused_variables = "deny"

# Profiling: enable debug symbols in release builds
[profile.release]
debug = true
