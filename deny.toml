# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Ignore unmaintained transitive dependencies we can't directly control
ignore = [
    # rustls-pemfile — unmaintained, pulled in by tonic → qdrant-client
    # Will be resolved when tonic upgrades to rustls-pki-types
    "RUSTSEC-2025-0134",
    # instant — unmaintained, pulled in by notify-types → notify-debouncer-full (LSP file watcher)
    "RUSTSEC-2024-0384",
]
