# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Keep advisories strict; do not suppress by default.
ignore = []

[licenses]
# Workspace policy: allow common permissive OSS licenses used by transitive deps.
allow = [
    "0BSD",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
