# Qail Gateway — Quickstart
#
# Usage:
#   docker compose up -d
#   curl http://localhost:8080/health
#   curl -X POST http://localhost:8080/qail -d 'get users fields id, name limit 10'

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: qail
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/qail
      BIND_ADDRESS: "0.0.0.0:8080"
      RUST_LOG: qail_gateway=info
      # ── Auth (uncomment to enable JWT) ──
      # JWT_SECRET: your-secret-key-here
      # ── Rate Limiting ──
      RATE_LIMIT_RATE: "1000"
      # ── Pool ──
      POOL_MIN_CONNECTIONS: "5"

volumes:
  pgdata:
