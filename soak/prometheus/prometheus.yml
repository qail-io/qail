global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'qail-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.containers.internal:8080']
        labels:
          instance: 'gateway.qail.io'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
